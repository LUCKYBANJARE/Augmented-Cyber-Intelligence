<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Network Visualization (non-AR)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style> body { margin:0; overflow:hidden; } canvas { display:block; } </style>
</head>
<body>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    const socket = io();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10,10,10);
    scene.add(light);

    const nodes = {};

    function createNode(ip) {
      if (nodes[ip]) return nodes[ip];
      const geometry = new THREE.SphereGeometry(0.28, 16, 16);
      const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
      const sphere = new THREE.Mesh(geometry, material);
      sphere.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*8, (Math.random()-0.5)*8);
      scene.add(sphere);
      nodes[ip] = sphere;
      return sphere;
    }

    function createConnection(src, dst) {
      const s1 = createNode(src);
      const s2 = createNode(dst);
      const material = new THREE.LineBasicMaterial({ color: 0xffffff });
      const points = [ s1.position.clone(), s2.position.clone() ];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      setTimeout(()=> scene.remove(line), 2000);
    }

    // Listen for both event names to be robust
    socket.on("new_packet_event", data => {
      createConnection(data.src || data.source_node, data.dst || data.destination_node);
      console.log("new_packet_event:", data);
    });

    socket.on("new_packet", data => {
      createConnection(data.src, data.dst);
      console.log("new_packet:", data);
    });

    camera.position.z = 15;

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
